<!-- MODAL NOVA OS -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)fecharModal()">
  <div class="modal-box">
    <div class="modal-title">NOVA ORDEM DE SERVIÇO</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <div class="lbl">Nº OS <span style="color:var(--muted);font-size:9px;font-weight:400;letter-spacing:0;text-transform:none">← do Oficina Inteligente</span></div>
        <input class="inp inp-mono" id="m-num" placeholder="Ex: 1234">
      </div>
      <div class="form-group"><div class="lbl">Data Entrada</div><input class="inp" id="m-data" type="date"></div>
    </div>
    <div class="form-group">
      <div class="lbl">Tipo de Entrada</div>
      <div style="display:flex;gap:8px">
        <button type="button" id="tipo-btn-veiculo" onclick="setTipo('veiculo')" style="flex:1;padding:8px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700;background:var(--accent);color:#000;border:none">🚛 Veículo / Máquina</button>
        <button type="button" id="tipo-btn-peca" onclick="setTipo('peca')" style="flex:1;padding:8px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;background:var(--surface2);color:var(--muted);border:1px solid var(--border)">🔩 Peça Avulsa</button>
      </div>
    </div>
    <div id="campo-veiculo" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group"><div class="lbl">Placa <span style="color:var(--accent4)">*</span></div><input class="inp inp-mono" id="m-placa" placeholder="ABC-1234" maxlength="8"></div>
      <div class="form-group"><div class="lbl">Modelo / Tipo</div><input class="inp" id="m-modelo" placeholder="Scania, Trator, Máquina..."></div>
    </div>
    <div id="campo-peca" style="display:none" class="form-group">
      <div class="lbl">Descrição da Peça <span style="color:var(--accent4)">*</span></div>
      <input class="inp" id="m-peca" placeholder="Ex: Bomba injetora Scania série 5...">
    </div>
    <div class="form-group"><div class="lbl">Nome do Cliente <span style="color:var(--accent4)">*</span></div><input class="inp" id="m-cliente" placeholder="Nome completo ou empresa"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group"><div class="lbl">Setor</div>
        <select class="inp" id="m-setor" onchange="atualizarOperadores('m-operador',this.value);mostrarVinculo(this.value)">
          <option>Bomba Injetora</option><option>Bomba de Alta</option>
          <option>Injetores Mecânicos</option><option>Injetores Eletrônicos</option>
          <option>Veículo Diesel</option><option>Turbinas</option>
        </select>
      </div>
      <div class="form-group"><div class="lbl">Status Inicial</div>
        <select class="inp" id="m-status"><option>Diagnóstico</option></select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <div class="lbl">Operador / Mecânico</div>
        <select class="inp" id="m-operador"><option value="">— Selecionar —</option></select>
      </div>
      <div class="form-group" id="m-vinculo-row" style="display:none">
        <div class="lbl">🔗 Vincular a OS (Pátio → Setor)</div>
        <select class="inp" id="m-vinculo"><option value="">Sem vínculo</option></select>
      </div>
    </div>
    <div id="campos-extras-form"></div>
    <div class="form-group"><div class="lbl">Observações</div><textarea class="inp" id="m-obs" rows="2" placeholder="Sintoma, peças necessárias..."></textarea></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px">
      <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar-os" onclick="salvarOS()">Salvar OS</button>
    </div>
  </div>
</div>
