<!-- MODAL CONFIG -->
<div class="modal-bg" id="modalConfig" onclick="if(event.target===this)fecharConfig()">
  <div class="modal-box" style="max-width:660px">
    <div class="modal-title">⚙️ CONFIGURAÇÕES</div>

    <!-- Abas internas -->
    <div style="display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px">
      <div id="cfg-tab-campos" onclick="mostrarCfgAba('campos')"
        style="padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;border-bottom:2px solid var(--accent);color:var(--accent)">
        📋 Campos do Formulário
      </div>
      <div id="cfg-tab-etapas" onclick="mostrarCfgAba('etapas')"
        style="padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted)">
        🗂 Etapas do Kanban
      </div>
      <div id="cfg-tab-operadores" onclick="mostrarCfgAba('operadores')"
        style="padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted)">
        👤 Operadores
      </div>
    </div>

    <!-- ABA CAMPOS -->
    <div id="cfg-aba-campos">
      <div class="alert alert-i" style="margin-bottom:12px"><div>💡</div><div>Adicione os campos do <strong>Oficina Inteligente</strong>.</div></div>
      <div id="lista-campos-config"></div>
      <button class="btn btn-ghost" onclick="adicionarCampo()" style="width:100%;margin-top:8px;margin-bottom:14px">+ Adicionar campo</button>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="fecharConfig()">Cancelar</button>
        <button class="btn btn-primary" id="btn-salvar-config" onclick="salvarConfig()">💾 Salvar Campos</button>
      </div>
    </div>

    <!-- ABA OPERADORES -->
    <div id="cfg-aba-operadores" style="display:none">
      <div class="alert alert-i" style="margin-bottom:12px"><div>💡</div><div>Cadastre os mecânicos de cada setor. Eles aparecerão no formulário de OS.</div></div>
      <div id="lista-operadores-config"></div>
      <button class="btn btn-ghost" onclick="adicionarOperadorTemp()" style="width:100%;margin-top:8px;margin-bottom:14px">+ Adicionar operador</button>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="fecharConfig()">Cancelar</button>
        <button class="btn btn-primary" id="btn-salvar-operadores" onclick="salvarOperadoresConfig()">💾 Salvar Operadores</button>
      </div>
    </div>

    <!-- ABA ETAPAS -->
    <div id="cfg-aba-etapas" style="display:none">
      <div class="alert alert-i" style="margin-bottom:12px"><div>💡</div><div>Renomeie, reordene, adicione ou remova as colunas do <strong>Kanban</strong>.</div></div>
      <div id="lista-etapas-config"></div>
      <button class="btn btn-ghost" onclick="adicionarEtapa()" style="width:100%;margin-top:8px;margin-bottom:14px">+ Adicionar etapa</button>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="fecharConfig()">Cancelar</button>
        <button class="btn btn-primary" id="btn-salvar-etapas" onclick="salvarEtapas()">💾 Salvar Etapas</button>
      </div>
    </div>
  </div>
</div>
